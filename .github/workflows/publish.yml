name: Publish to npm

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install
      - run: bun run test
      - run: bun run build

      - run: npm install -g npm@latest

      - name: Publish to npm (OIDC)
        run: npm publish --provenance --access public --registry https://registry.npmjs.org
